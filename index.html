<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getDatabase, ref, set, get, child, onChildAdded, onChildChanged, onValue, update, push, remove, onDisconnect, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-database.js";

    // Firebaseの設定
    const firebaseConfig = {
        apiKey: "AIzaSyAfjTWeL71syzo7SNpym7ATcbrq6i7JfXQ",
        authDomain: "game-server-df061.firebaseapp.com",
        databaseURL: "https://game-server-df061-default-rtdb.firebaseio.com",
        projectId: "game-server-df061",
        storageBucket: "game-server-df061.firebasestorage.app",
        messagingSenderId: "475396427934",
        appId: "1:475396427934:web:5106a6210aa51e3b8f6b8f"
    };

    let app, auth, db;
    let myUid = null;
    let myRoomId = null;
    let isHost = false;
    let roomDuration = 0;

    // --- ゲーム設定 ---
    const CELL_SIZE = 0.000005; // 50cm四方
    const COLORS = ['#3B82F6', '#EF4444', '#EAB308', '#22C55E', '#F97316', '#A855F7', '#06B6D4', '#EC4899'];
    let myColor = '#FFFFFF';
    
    // 和泉市全域 座標設定
    const CENTER_LAT = 34.465500;
    const CENTER_LNG = 135.457500; 
    const PLAY_AREA = { north: 34.525000, south: 34.325000, west: 135.410000, east: 135.535000 };

    // 状態変数
    let map = null;
    let playerMarker = null;
    let otherPlayerMarkers = {}; // { uid: L.marker }
    let watchId = null;
    let isPlaying = false;
    let remainingSeconds = 0;
    let timerInterval = null;
    
    // GPS補正用変数
    let latOffset = 0, lngOffset = 0, rawLat = 0, rawLng = 0;
    let isCalibrating = false; 
    
    const gridData = new Map();
    let colorScores = {};

    // UI要素
    const ui = {
        loading: document.getElementById('loading-screen'),
        lobby: document.getElementById('lobby-screen'),
        setup: document.getElementById('setup-screen'),
        waiting: document.getElementById('waiting-screen'),
        game: document.getElementById('ui-layer'),
        result: document.getElementById('result-screen'),
        status: document.getElementById('status-message'),
        timer: document.getElementById('timer-display'),
        ranking: document.getElementById('ranking-container'),
        finalScore: document.getElementById('final-score'),
        finalRank: document.getElementById('final-rank'),
        mapContainer: document.getElementById('map-container'),
        roomList: document.getElementById('room-list-container'),
        waitingPlayers: document.getElementById('waiting-players'),
        btnStartRoom: document.getElementById('btn-start-room')
    };
    const btns = {
        recenter: document.getElementById('btn-recenter'),
        calibrate: document.getElementById('btn-calibrate'),
        restart: document.getElementById('btn-restart'),
        showCreate: document.getElementById('btn-show-create'),
        cancelCreate: document.getElementById('btn-cancel-create'),
        modes: document.querySelectorAll('.mode-btn')
    };

    // --- 初期化 ---
    async function initSystem() {
        try {
            app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            db = getDatabase(app);
            
            onAuthStateChanged(auth, (user) => {
                if (user && !isPlaying) {
                    myUid = user.uid;
                    showLobbyScreen();
                }
            });
            await signInAnonymously(auth);
        } catch (error) {
            console.error("Firebase Connection Error:", error);
            document.getElementById('loading-text').innerText = "接続エラー: リロードしてください";
        }
    }

    // --- ロビー機能 ---
    function showLobbyScreen() {
        ui.loading.classList.add('hidden');
        ui.setup.classList.add('hidden');
        ui.lobby.classList.remove('hidden');

        // ルーム一覧の監視
        onValue(ref(db, 'rooms'), (snap) => {
            if(isPlaying || ui.lobby.classList.contains('hidden')) return;
            ui.roomList.innerHTML = '';
            const rooms = snap.val();
            let count = 0;
            
            if (rooms) {
                for (const roomId in rooms) {
                    const room = rooms[roomId];
                    if (room.status === "waiting") {
                        count++;
                        const pCount = room.players ? Object.keys(room.players).length : 0;
                        const durationText = room.duration > 0 ? `${room.duration}分` : "無制限";
                        
                        const div = document.createElement('div');
                        div.className = 'room-item bg-gray-800 p-3 rounded-lg border border-gray-600 flex justify-between items-center';
                        div.innerHTML = `
                            <div>
                                <div class="text-white font-bold text-sm">Room: ${roomId.substring(0, 5).toUpperCase()}</div>
                                <div class="text-gray-400 text-xs">時間: ${durationText} | 参加: ${pCount}人</div>
                            </div>
                            <div class="text-green-400 font-bold text-sm">参加 ➔</div>
                        `;
                        div.onclick = () => joinRoom(roomId);
                        ui.roomList.appendChild(div);
                    }
                }
            }
            if (count === 0) {
                ui.roomList.innerHTML = '<div class="text-center text-gray-500 text-sm mt-4">参加可能なルームがありません</div>';
            }
        });
    }

    btns.showCreate.onclick = () => {
        ui.lobby.classList.add('hidden');
        ui.setup.classList.remove('hidden');
    };
    btns.cancelCreate.onclick = () => {
        ui.setup.classList.add('hidden');
        ui.lobby.classList.remove('hidden');
    };

    // --- ルーム作成・参加 ---
    btns.modes.forEach(btn => {
        btn.addEventListener('click', async (e) => {
            const minutes = parseInt(e.target.dataset.time);
            await createRoom(minutes);
        });
    });

    async function createRoom(minutes) {
        isHost = true;
        roomDuration = minutes;
        // シンプルなID生成
        myRoomId = Math.random().toString(36).substring(2, 8).toUpperCase();
        myColor = COLORS[0];

        const roomRef = ref(db, `rooms/${myRoomId}`);
        await set(roomRef, {
            status: "waiting",
            duration: minutes,
            host: myUid,
            createdAt: serverTimestamp()
        });

        // 自分が切断されたらルームごと消す (ホストの特権)
        onDisconnect(roomRef).remove();

        await joinRoomInternal(myRoomId, myColor);
        showWaitingScreen();
    }

    async function joinRoom(roomId) {
        isHost = false;
        myRoomId = roomId;

        // 色の決定と参加
        const playersRef = ref(db, `rooms/${roomId}/players`);
        const snapshot = await get(playersRef);
        let pCount = 0;
        if (snapshot.exists()) {
            pCount = Object.keys(snapshot.val()).length;
        }
        myColor = COLORS[pCount % COLORS.length];

        // 部屋のルール取得
        const roomSnap = await get(ref(db, `rooms/${roomId}/duration`));
        if(roomSnap.exists()) roomDuration = roomSnap.val();

        await joinRoomInternal(roomId, myColor);
        showWaitingScreen();
    }

    async function joinRoomInternal(roomId, color) {
        const myPlayerRef = ref(db, `rooms/${roomId}/players/${myUid}`);
        await set(myPlayerRef, {
            id: myUid,
            color: color,
            joinedAt: serverTimestamp()
        });
        // 切断時に自分をリストから消す
        if (!isHost) {
            onDisconnect(myPlayerRef).remove();
        }
    }

    // --- 待機画面 ---
    function showWaitingScreen() {
        ui.setup.classList.add('hidden');
        ui.lobby.classList.add('hidden');
        ui.waiting.classList.remove('hidden');
        
        document.getElementById('waiting-room-id').innerText = `Room: ${myRoomId}`;
        document.getElementById('waiting-rule').innerText = `作戦時間: ${roomDuration > 0 ? roomDuration+'分' : '無制限'}`;

        if (isHost) {
            ui.btnStartRoom.classList.remove('hidden');
            document.getElementById('waiting-status').innerText = "メンバーが揃ったら開始してください";
        }

        // ルームの監視（参加者更新とゲーム開始検知）
        const roomRef = ref(db, `rooms/${myRoomId}`);
        onValue(roomRef, (snap) => {
            const data = snap.val();
            if (!data) {
                // ルームが解散された場合
                if(!isPlaying) {
                    alert("ルームが解散されました");
                    location.reload();
                }
                return;
            }

            // プレイヤーリストの描画
            ui.waitingPlayers.innerHTML = '';
            if (data.players) {
                Object.values(data.players).forEach((p, index) => {
                    const isMe = p.id === myUid;
                    const div = document.createElement('div');
                    div.className = `flex items-center gap-3 p-2 rounded ${isMe ? 'bg-white/10 border border-gray-600' : 'bg-black/50'}`;
                    div.innerHTML = `
                        <div class="w-4 h-4 rounded-full shadow-[0_0_8px_currentColor]" style="background-color: ${p.color}; color: ${p.color}"></div>
                        <span class="text-sm font-bold ${isMe ? 'text-white' : 'text-gray-300'}">Player ${index + 1} ${isMe ? '(YOU)' : ''}</span>
                    `;
                    ui.waitingPlayers.appendChild(div);
                });
            }

            // ゲーム開始検知
            if (data.status === "playing" && !isPlaying) {
                startGame(data.duration);
            }
        });
    }

    ui.btnStartRoom.onclick = () => {
        if (!isHost || !myRoomId) return;
        update(ref(db, `rooms/${myRoomId}`), {
            status: "playing",
            startedAt: serverTimestamp()
        });
    };

    // --- ゲーム本体 ---
    function startGame(minutes) {
        ui.waiting.classList.add('hidden');
        ui.game.classList.remove('hidden');
        
        isPlaying = true;
        
        initMap(CENTER_LAT, CENTER_LNG);
        listenToCells(); 
        listenToOtherPlayers(); // 追加: 他人の位置を監視
        startGPS();      
        
        if (minutes > 0) {
            remainingSeconds = minutes * 60;
            updateTimerDisplay();
            timerInterval = setInterval(countdownTimer, 1000);
        } else {
            ui.timer.innerText = "無限";
            ui.timer.classList.remove('timer-hurry');
        }
    }

    function endGame() {
        isPlaying = false;
        clearInterval(timerInterval);
        if (watchId) navigator.geolocation.clearWatch(watchId);
        
        ui.game.classList.add('hidden');
        ui.result.classList.remove('hidden');
        
        const myScore = colorScores[myColor] || 0;
        ui.finalScore.innerText = myScore;
        
        const sorted = Object.entries(colorScores).sort((a, b) => b[1] - a[1]);
        let rank = sorted.findIndex(([color, _]) => color === myColor) + 1;
        if (myScore === 0) rank = "-";
        
        ui.finalRank.innerText = `Rank: ${rank}位`;
        if (rank === 1 && myScore > 0) ui.finalRank.innerText += " 🏆";

        // 終了時に自分の切断フックを削除して退出処理
        if(myRoomId && myUid) {
            remove(ref(db, `rooms/${myRoomId}/players/${myUid}`));
        }
    }

    function countdownTimer() {
        if (!isPlaying) return;
        remainingSeconds--;
        updateTimerDisplay();
        if (remainingSeconds <= 30) ui.timer.classList.add('timer-hurry');
        if (remainingSeconds <= 0) endGame();
    }

    function updateTimerDisplay() {
        const m = Math.floor(remainingSeconds / 60);
        const s = remainingSeconds % 60;
        ui.timer.innerText = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
    }

    // --- 地図と位置情報 ---
    function initMap(lat, lng) {
        if (map) return;
        const mapBounds = L.latLngBounds([PLAY_AREA.south, PLAY_AREA.west], [PLAY_AREA.north, PLAY_AREA.east]);
        map = L.map('map', { 
            zoomControl: false, doubleClickZoom: false,
            maxBounds: mapBounds, maxBoundsViscosity: 1.0, minZoom: 15                
        }).setView([lat, lng], 21);    

        L.tileLayer('https://cyberjapandata.gsi.go.jp/xyz/pale/{z}/{x}/{y}.png', {
            attribution: "<a href='https://maps.gsi.go.jp/development/ichiran.html'>国土地理院</a>",
            maxNativeZoom: 18, maxZoom: 23, bounds: mapBounds          
        }).addTo(map);

        const outerBounds = [[-90, -180], [90, -180], [90, 180], [-90, 180]];
        const innerBounds = [
            [PLAY_AREA.south, PLAY_AREA.west], [PLAY_AREA.north, PLAY_AREA.west],
            [PLAY_AREA.north, PLAY_AREA.east], [PLAY_AREA.south, PLAY_AREA.east]
        ];
        L.polygon([outerBounds, innerBounds], { color: 'black', fillColor: '#111', fillOpacity: 1, weight: 0 }).addTo(map);

        L.rectangle([[PLAY_AREA.south, PLAY_AREA.west], [PLAY_AREA.north, PLAY_AREA.east]], {
            color: "#ff0055", weight: 3, fillOpacity: 0.0, dashArray: "10, 10"
        }).addTo(map);

        const playerIcon = L.divIcon({
            className: 'custom-div-icon',
            html: `<div class='player-marker' style='color: ${myColor}; background-color: ${myColor}'></div>`,
            iconSize: [16, 16], iconAnchor: [8, 8]
        });
        playerMarker = L.marker([lat, lng], {icon: playerIcon, zIndexOffset: 1000}).addTo(map);

        // キャリブレーション機能
        map.on('click', (e) => {
            if (isCalibrating && isPlaying && rawLat !== 0) {
                latOffset = e.latlng.lat - rawLat;
                lngOffset = e.latlng.lng - rawLng;
                
                isCalibrating = false;
                ui.mapContainer.classList.remove('calibrating');
                btns.calibrate.innerText = "🔧 ズレを直す";
                btns.calibrate.classList.replace('bg-yellow-600', 'bg-yellow-900');
                
                updatePosition(rawLat, rawLng, 0, true); 
                ui.status.innerHTML = `<span class="text-green-400 font-bold">✅ ズレを修正しました！</span>`;
            }
        });
    }

    function isInsidePlayArea(lat, lng) {
        return lat >= PLAY_AREA.south && lat <= PLAY_AREA.north && lng >= PLAY_AREA.west && lng <= PLAY_AREA.east;
    }

    function updatePosition(plat, plng, accuracy, forceUpdate = false) {
        if (!isPlaying || !playerMarker) return;

        const finalLat = plat + latOffset;
        const finalLng = plng + lngOffset;

        playerMarker.setLatLng([finalLat, finalLng]);
        
        if (!isCalibrating) {
            map.panTo([finalLat, finalLng], { animate: true, duration: 1.0 });
        }

        if (!isInsidePlayArea(finalLat, finalLng)) {
            if(!isCalibrating) ui.status.innerHTML = `<span class="text-red-400">⚠️ エリア外 (和泉市内へ！)</span>`;
            return;
        }

        if(!isCalibrating) {
            ui.status.innerHTML = `<div class="w-3 h-3 rounded-full" style="background-color: ${myColor}"></div> <span class="text-white">スキャン中</span>`;
        }

        // Firebaseに自分の現在地を送信 (他プレイヤーへの共有用)
        if (myRoomId && myUid) {
            update(ref(db, `rooms/${myRoomId}/players/${myUid}`), { lat: finalLat, lng: finalLng });
        }

        // 陣取り処理
        const cx = Math.floor(finalLng / CELL_SIZE);
        const cy = Math.floor(finalLat / CELL_SIZE);
        
        for(let dy = -2; dy <= 2; dy++) {
            for(let dx = -2; dx <= 2; dx++) {
                const tx = cx + dx;
                const ty = cy + dy;
                const gridId = `${tx}_${ty}`;

                if (gridData.has(gridId) && gridData.get(gridId).owner === myUid) continue;

                // ルーム専用のcellsに書き込み
                const cellRef = child(ref(db, `rooms/${myRoomId}/cells`), gridId);
                set(cellRef, { owner: myUid, color: myColor, x: tx, y: ty, timestamp: serverTimestamp() }).catch(()=>{});
            }
        }
    }

    function startGPS() {
        if (!navigator.geolocation) { 
            ui.status.innerHTML = `<span class="text-red-500 font-bold">GPS非対応の端末です</span>`;
            return; 
        }

        ui.status.innerHTML = `<div class="w-2 h-2 bg-yellow-400 rounded-full animate-pulse"></div> 🛰️ 衛星を捕捉中... 開けた場所へ！`;

        watchId = navigator.geolocation.watchPosition(
            (position) => {
                rawLat = position.coords.latitude;
                rawLng = position.coords.longitude;
                const accuracy = position.coords.accuracy;

                if (accuracy > 40 && !isCalibrating) {
                    ui.status.innerHTML = `<span class="text-yellow-400 font-bold">⚠️ GPS精度低下中(誤差${Math.round(accuracy)}m)</span>`;
                    return;
                }
                updatePosition(rawLat, rawLng, accuracy);
            },
            (error) => {
                if(isCalibrating) return;
                let errMsg = "GPSエラー";
                if (error.code === 1) errMsg = "❌ 位置情報が許可されていません";
                if (error.code === 2) errMsg = "📡 電波が弱いです。外へ出てください";
                if (error.code === 3) errMsg = "⏱️ GPSタイムアウト";
                ui.status.innerHTML = `<span class="text-red-400 font-bold">${errMsg}</span>`;
            },
            { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
        );
    }

    // --- Firebase 同期処理 ---
    function drawCell(gridId, x, y, color, owner) {
        if (gridData.has(gridId)) {
            const existing = gridData.get(gridId);
            if (existing.owner === owner && existing.color === color) return;
            if (map) map.removeLayer(existing.rect);
            if (colorScores[existing.color]) colorScores[existing.color]--;
        }

        const bounds = [[y * CELL_SIZE, x * CELL_SIZE], [(y + 1) * CELL_SIZE, (x + 1) * CELL_SIZE]];
        const rect = L.rectangle(bounds, { color: color, weight: 0, fillColor: color, fillOpacity: 0.85, className: 'grid-cell' });
        if (map) rect.addTo(map);

        gridData.set(gridId, { rect, owner, color });
        colorScores[color] = (colorScores[color] || 0) + 1;
        updateRanking();
    }

    function listenToCells() {
        const cellsRef = ref(db, `rooms/${myRoomId}/cells`);
        onChildAdded(cellsRef, (data) => {
            const val = data.val();
            drawCell(data.key, val.x, val.y, val.color, val.owner);
        });
        onChildChanged(cellsRef, (data) => {
            const val = data.val();
            drawCell(data.key, val.x, val.y, val.color, val.owner);
        });
    }

    // 新規追加：他プレイヤーの位置の監視と描画
    function listenToOtherPlayers() {
        const playersRef = ref(db, `rooms/${myRoomId}/players`);
        onValue(playersRef, (snap) => {
            const players = snap.val();
            if (!players || !map) return;

            for (const uid in players) {
                if (uid === myUid) continue; // 自分はスキップ
                
                const p = players[uid];
                if (p.lat && p.lng) {
                    if (otherPlayerMarkers[uid]) {
                        // 既存マーカーの移動
                        otherPlayerMarkers[uid].setLatLng([p.lat, p.lng]);
                    } else {
                        // 新規マーカーの作成
                        const icon = L.divIcon({
                            className: 'custom-div-icon',
                            html: `<div class='other-player-marker' style='color: ${p.color}; background-color: ${p.color}'></div>`,
                            iconSize: [14, 14], iconAnchor: [7, 7]
                        });
                        otherPlayerMarkers[uid] = L.marker([p.lat, p.lng], {icon: icon, zIndexOffset: 900}).addTo(map);
                    }
                }
            }
            
            // 退出したプレイヤーのマーカーを消去
            for (const uid in otherPlayerMarkers) {
                if (!players[uid]) {
                    map.removeLayer(otherPlayerMarkers[uid]);
                    delete otherPlayerMarkers[uid];
                }
            }
        });
    }

    function updateRanking() {
        const sorted = Object.entries(colorScores).filter(([_, count]) => count > 0).sort((a, b) => b[1] - a[1]);
        ui.ranking.innerHTML = '';
        if(sorted.length === 0) return ui.ranking.innerHTML = '<div class="text-center text-sm text-gray-500">No Data</div>';

        sorted.forEach(([color, count], index) => {
            const isMe = color === myColor;
            const item = document.createElement('div');
            item.className = `flex justify-between items-center p-1 rounded ${isMe ? 'bg-white/10' : ''}`;
            item.innerHTML = `
                <div class="flex items-center gap-2">
                    <span class="text-[10px] text-gray-400 w-2">${index + 1}</span>
                    <div class="w-2.5 h-2.5 rounded-full" style="background-color: ${color}"></div>
                    <span class="text-[10px] ${isMe ? 'text-white font-bold' : 'text-gray-400'}">${isMe ? 'YOU' : 'P'+(index+1)}</span>
                </div>
                <span class="font-bold text-xs ${isMe ? 'text-white' : 'text-gray-300'}">${count}<span class="text-[8px] font-normal ml-0.5">マス</span></span>
            `;
            ui.ranking.appendChild(item);
        });
    }

    // --- ボタン処理 ---
    btns.restart.addEventListener('click', () => location.reload());
    
    btns.recenter.addEventListener('click', () => {
        if (!map || !playerMarker) return;
        map.setView(playerMarker.getLatLng(), 21, { animate: true });
    });

    btns.calibrate.addEventListener('click', () => {
        if (!isCalibrating) {
            isCalibrating = true;
            ui.mapContainer.classList.add('calibrating');
            btns.calibrate.innerText = "❌ キャンセル";
            btns.calibrate.classList.replace('bg-yellow-900', 'bg-yellow-600');
            ui.status.innerHTML = `<span class="text-yellow-400 font-bold animate-pulse">👇 地図上の「本当の現在地」をタップしてください</span>`;
        } else {
            isCalibrating = false;
            ui.mapContainer.classList.remove('calibrating');
            btns.calibrate.innerText = "🔧 ズレを直す";
            btns.calibrate.classList.replace('bg-yellow-600', 'bg-yellow-900');
            ui.status.innerHTML = `<div class="w-3 h-3 rounded-full" style="background-color: ${myColor}"></div> <span class="text-white">スキャン再開</span>`;
        }
    });

    // 起動
    initSystem();

</script>
</body>
</html>
